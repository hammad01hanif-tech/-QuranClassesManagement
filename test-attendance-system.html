<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اختبار نظام حضور المعلمين</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      direction: rtl;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    h1 {
      text-align: center;
      color: #667eea;
      margin-bottom: 30px;
      font-size: 32px;
    }
    
    .section {
      margin-bottom: 30px;
      padding: 20px;
      background: #f8fafc;
      border-radius: 12px;
      border-right: 4px solid #667eea;
    }
    
    .section h2 {
      color: #2d3748;
      margin-bottom: 15px;
      font-size: 20px;
    }
    
    .input-group {
      margin-bottom: 15px;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      color: #4a5568;
      font-weight: 600;
      font-size: 14px;
    }
    
    select, input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
    }
    
    select:focus, input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
      width: 100%;
    }
    
    button:hover {
      transform: translateY(-2px);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .result {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
      border: 2px solid #e2e8f0;
    }
    
    .result h3 {
      color: #2d3748;
      margin-bottom: 15px;
      font-size: 18px;
    }
    
    .result-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #e2e8f0;
    }
    
    .result-item:last-child {
      border-bottom: none;
    }
    
    .result-label {
      color: #64748b;
      font-weight: 600;
    }
    
    .result-value {
      color: #1e293b;
      font-weight: 700;
    }
    
    .result-value.penalty {
      color: #dc2626;
    }
    
    .result-value.success {
      color: #16a34a;
    }
    
    .teacher-card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      border: 2px solid #e2e8f0;
    }
    
    .teacher-card h4 {
      color: #667eea;
      margin-bottom: 8px;
    }
    
    .teacher-detail {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 اختبار نظام حضور المعلمين</h1>
    
    <!-- قسم عرض المعلمين -->
    <div class="section">
      <h2>👥 قائمة المعلمين</h2>
      <div id="teachersList"></div>
    </div>
    
    <!-- قسم حساب الخصميات -->
    <div class="section">
      <h2>💰 حساب خصمية التأخير</h2>
      
      <div class="input-group">
        <label>اختر المعلم:</label>
        <select id="teacherSelect"></select>
      </div>
      
      <div class="input-group">
        <label>وقت أذان العصر:</label>
        <input type="time" id="asrTime" value="15:40">
      </div>
      
      <div class="input-group">
        <label>وقت الحضور الفعلي:</label>
        <input type="time" id="checkInTime" value="16:30">
      </div>
      
      <button onclick="calculatePenalty()">حساب الخصمية</button>
      
      <div id="result"></div>
    </div>
    
    <!-- قسم حساب خصمية الغياب -->
    <div class="section">
      <h2>❌ حساب خصمية الغياب</h2>
      
      <div class="input-group">
        <label>اختر المعلم:</label>
        <select id="absenceTeacherSelect"></select>
      </div>
      
      <div class="input-group">
        <label>عدد أيام الدراسة في الشهر:</label>
        <input type="number" id="studyDays" value="20" min="1" max="31">
      </div>
      
      <div class="input-group">
        <label>الغياب بعذر؟</label>
        <select id="isExcused">
          <option value="false">لا</option>
          <option value="true">نعم</option>
        </select>
      </div>
      
      <button onclick="calculateAbsence()">حساب الخصمية</button>
      
      <div id="absenceResult"></div>
    </div>
  </div>
  
  <script type="module">
    import { getActiveTeachers, getTeacherConfig } from './data/teachers-attendance-config.js';
    import { 
      calculateWorkStartTime,
      calculateLatePenalty,
      calculateAbsencePenalty,
      formatTime 
    } from './js/attendance-calculator.js';
    
    // عرض المعلمين في القائمة
    function displayTeachers() {
      const teachers = getActiveTeachers();
      const teachersList = document.getElementById('teachersList');
      const teacherSelect = document.getElementById('teacherSelect');
      const absenceTeacherSelect = document.getElementById('absenceTeacherSelect');
      
      teachersList.innerHTML = '';
      teacherSelect.innerHTML = '';
      absenceTeacherSelect.innerHTML = '';
      
      teachers.forEach(teacher => {
        // عرض في البطاقة
        const card = document.createElement('div');
        card.className = 'teacher-card';
        card.innerHTML = `
          <h4>${teacher.name} (${teacher.id})</h4>
          <div class="teacher-detail">💰 الراتب: ${teacher.salary.monthlySalary} ريال</div>
          <div class="teacher-detail">⏰ بداية الدوام: العصر + ${teacher.workSchedule.minutesAfterAsr} دقيقة</div>
          <div class="teacher-detail">⏰ نهاية الدوام: العشاء + ${teacher.workSchedule.minutesAfterIsha} دقيقة</div>
          <div class="teacher-detail">📋 نوع العقد: ${teacher.metadata.contractType}</div>
        `;
        teachersList.appendChild(card);
        
        // إضافة للقائمة المنسدلة
        const option1 = document.createElement('option');
        option1.value = teacher.id;
        option1.textContent = teacher.name;
        teacherSelect.appendChild(option1);
        
        const option2 = option1.cloneNode(true);
        absenceTeacherSelect.appendChild(option2);
      });
    }
    
    // حساب خصمية التأخير
    window.calculatePenalty = function() {
      const teacherId = document.getElementById('teacherSelect').value;
      const asrTime = document.getElementById('asrTime').value;
      const checkInTimeStr = document.getElementById('checkInTime').value;
      
      // تحويل الأوقات
      const today = new Date();
      const [asrHours, asrMinutes] = asrTime.split(':');
      const [checkHours, checkMinutes] = checkInTimeStr.split(':');
      
      // حساب وقت بداية الدوام
      const workStartTime = calculateWorkStartTime(asrTime, teacherId);
      
      // وقت الحضور الفعلي
      const checkInTime = new Date();
      checkInTime.setHours(parseInt(checkHours), parseInt(checkMinutes), 0, 0);
      
      // حساب الخصمية
      const penalty = calculateLatePenalty(checkInTime, workStartTime, teacherId);
      
      // عرض النتيجة
      const result = document.getElementById('result');
      result.innerHTML = `
        <div class="result">
          <h3>📊 النتيجة</h3>
          <div class="result-item">
            <span class="result-label">وقت أذان العصر:</span>
            <span class="result-value">${asrTime}</span>
          </div>
          <div class="result-item">
            <span class="result-label">بداية الدوام:</span>
            <span class="result-value">${formatTime(workStartTime, true)}</span>
          </div>
          <div class="result-item">
            <span class="result-label">وقت الحضور:</span>
            <span class="result-value">${checkInTimeStr}</span>
          </div>
          <div class="result-item">
            <span class="result-label">مدة التأخير:</span>
            <span class="result-value ${penalty.lateMinutes > 0 ? 'penalty' : 'success'}">
              ${penalty.lateMinutes} دقيقة
            </span>
          </div>
          <div class="result-item">
            <span class="result-label">عدد الفترات:</span>
            <span class="result-value">${penalty.intervals}</span>
          </div>
          <div class="result-item">
            <span class="result-label">الخصمية:</span>
            <span class="result-value ${penalty.penalty > 0 ? 'penalty' : 'success'}">
              ${penalty.penalty} ريال
            </span>
          </div>
        </div>
      `;
    };
    
    // حساب خصمية الغياب
    window.calculateAbsence = function() {
      const teacherId = document.getElementById('absenceTeacherSelect').value;
      const studyDays = parseInt(document.getElementById('studyDays').value);
      const isExcused = document.getElementById('isExcused').value === 'true';
      
      // حساب الخصمية
      const penalty = calculateAbsencePenalty(teacherId, isExcused, studyDays);
      
      // الحصول على بيانات المعلم
      const teacher = getTeacherConfig(teacherId);
      
      // عرض النتيجة
      const result = document.getElementById('absenceResult');
      result.innerHTML = `
        <div class="result">
          <h3>📊 النتيجة</h3>
          <div class="result-item">
            <span class="result-label">المعلم:</span>
            <span class="result-value">${teacher.name}</span>
          </div>
          <div class="result-item">
            <span class="result-label">الراتب الشهري:</span>
            <span class="result-value">${teacher.salary.monthlySalary} ريال</span>
          </div>
          <div class="result-item">
            <span class="result-label">أيام الدراسة:</span>
            <span class="result-value">${studyDays} يوم</span>
          </div>
          <div class="result-item">
            <span class="result-label">نوع الغياب:</span>
            <span class="result-value">${isExcused ? 'بعذر ✅' : 'بدون عذر ❌'}</span>
          </div>
          <div class="result-item">
            <span class="result-label">طريقة الحساب:</span>
            <span class="result-value">${teacher.penalties.absencePenalty.calculationMethod}</span>
          </div>
          <div class="result-item">
            <span class="result-label">الخصمية:</span>
            <span class="result-value ${penalty > 0 ? 'penalty' : 'success'}">
              ${penalty} ريال
            </span>
          </div>
        </div>
      `;
    };
    
    // تشغيل عند تحميل الصفحة
    displayTeachers();
  </script>
</body>
</html>
